# 服务器配置
server:
  port: 9998  # 服务端口号
  servlet:
    context-path: /system  # 应用上下文路径

# Spring 配置
spring:
  # 应用配置
  application:
    name: system-service  # 应用名称，用于服务注册和发现
  # 配置文件包含
  profiles:
    include: common  # 包含common配置文件
    active: dev  # 激活 dev 环境
  # 自动配置排除
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfiguration  # 排除Redisson自动配置
  # 云服务配置
  cloud:
    # Nacos配置
    nacos:
      # 服务发现配置
      discovery:
        service: ${spring.application.name}  # 服务名称
        register-enabled: true  # 启用服务注册
        watch-enabled: true  # 启用服务发现
        use-endpoint-parsing: false  # 不使用端点解析
        use-cloud-namespace-parsing: false  # 不使用云命名空间解析
      # 配置中心配置
      config:
        enabled: false  # 禁用配置中心
  # 数据库配置
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/demo?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true  # 数据库连接URL
    username: root  # 数据库用户名
    password: root  # 数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver  # 数据库驱动类
    # Hikari连接池配置
    hikari:
      maximum-pool-size: 20  # 最大连接池大小
      minimum-idle: 5  # 最小空闲连接数
      idle-timeout: 300000  # 空闲超时时间（毫秒）
      max-lifetime: 1200000  # 连接最大生命周期（毫秒）
      connection-timeout: 30000  # 连接超时时间（毫秒）
  # MVC配置
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher  # 路径匹配策略
  # Redis 配置
  redis:
    enabled: true  # 启用Redis
    host: 127.0.0.1  # Redis主机地址
    port: 6379  # Redis端口
    password: 123456  # Redis密码
    database: 0  # Redis数据库索引
    # Redis环境配置
    env:
      prefix: dev  # 开发环境前缀

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml  # Mapper XML文件位置
  type-aliases-package: com.cobazaar.system.entity  # 类型别名包路径
  # 全局配置
  global-config:
    db-config:
      id-type: assign_id  # ID生成策略
      logic-delete-field: delFlag  # 逻辑删除字段
      logic-delete-value: 1  # 逻辑删除值
      logic-not-delete-value: 0  # 逻辑未删除值
      db-type: mysql  # 数据库类型

  # 配置
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 日志实现
    map-underscore-to-camel-case: true  # 下划线转驼峰
    cache-enabled: false  # 禁用缓存
    lazy-loading-enabled: false  # 禁用延迟加载

# Spring Security 配置
spring.security:
  user:
    name: admin  # 用户名
    password: admin123  # 密码
    roles: ADMIN  # 角色

# 日志配置
logging:
  level:
    com.cobazaar.system: debug  # 系统模块日志级别
    com.cobazaar.common: debug  # 公共模块日志级别
    org.springframework.security: info  # Spring Security日志级别
    com.baomidou.mybatisplus: debug  # MyBatis Plus日志级别

# SpringDoc 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  # 配置服务器URL，确保生成的文档包含正确的路径前缀
  server-url: /system