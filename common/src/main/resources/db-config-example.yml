# MyBatis Plus 数据库配置示例
# 请在具体的服务模块的 application.yml 中添加以下配置

spring:
  datasource:
    # MySQL数据库配置
    url: jdbc:mysql://127.0.0.1:3307/demo?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 连接池配置
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

# MyBatis Plus 配置
mybatis-plus:
  # Mapper XML 文件路径
  mapper-locations: classpath*:mapper/**/*.xml
  # 实体类包路径
  type-aliases-package: com.cobazaar.**.entity
  # 全局配置
  global-config:
    db-config:
      # 主键策略
      id-type: assign_id
      # 逻辑删除字段
      logic-delete-field: delFlag
      # 逻辑删除值
      logic-delete-value: 1
      # 逻辑未删除值
      logic-not-delete-value: 0
      # 数据库类型
      db-type: mysql
    # 自动填充字段
    meta-object-handler: com.cobazaar.common.handler.MyMetaObjectHandler
  # 配置
  configuration:
    # SQL日志输出
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 开启驼峰映射
    map-underscore-to-camel-case: true
    # 缓存
    cache-enabled: false
    # 延迟加载
    lazy-loading-enabled: false

# 分页插件配置（可选）
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql